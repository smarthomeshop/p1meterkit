# P1MeterKit V3 Thread network package.
#
# Local / Home Assistant only: the device joins your existing Thread mesh
# through a Thread border router (for example Home Assistant with a
# SkyConnect / Connect ZBT-1) and is reachable over IPv6 via the native
# ESPHome API. There is no WiFi, no fallback AP and no SmartHomeShop cloud
# in this variant.
#
# The Thread network credentials come from the ${thread_dataset} TLV
# substitution, which you copy from Home Assistant:
#   Settings -> Devices & Services -> Thread -> Configure (cogwheel)
#   -> information icon on your network -> Active dataset TLVs.
#
# Thread is a low-bandwidth mesh network. Reading a full DSMR telegram
# every second would flood the mesh, so this variant uses the DSMR request
# pin to read one telegram every 5 seconds instead. All values still arrive
# in Home Assistant, just at a 5s cadence.
#
# Note: the firmware selector / update entity from base.yaml needs internet
# access and therefore does not work over Thread. Update this device through
# the ESPHome Dashboard (OTA over IPv6, or USB).

network:
  enable_ipv6: true

openthread:
  tlv: ${thread_dataset}

dsmr:
  request_interval: 5s
